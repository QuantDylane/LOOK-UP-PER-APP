{% extends "base.html" %}

{% block title %}Mot de passe modifié{% endblock %}
{% block page_title %}Mot de passe modifié{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="alert alert-success">
            <i class="bi bi-check-circle-fill me-2"></i>
            Votre mot de passe a été mis à jour avec succès.
        </div>
        <a href="{% url 'mon_compte' %}" class="btn btn-primary">
            <i class="bi bi-person me-1"></i>Retour à mon compte
        </a>
        <a href="{% url 'reporting:accueil' %}" class="btn btn-outline-secondary">
            <i class="bi bi-house me-1"></i>Accueil
        </a>
    </div>
</div>
{% endblock %}

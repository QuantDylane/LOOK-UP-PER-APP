{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié — PER/PEE Reporting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height:100vh; }
        .card { border-radius: 18px; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="card shadow-lg">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <img src="{% static 'images/cgf.png' %}" alt="CGF Gestion" style="height:48px;">
                        <h1 class="h4 mt-3">Mot de passe oublié&nbsp;?</h1>
                        <p class="text-muted small mb-0">
                            Saisissez votre adresse e-mail. Si elle est associée à un compte, vous recevrez un lien de réinitialisation.
                        </p>
                    </div>
                    <form method="post" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Adresse e-mail</label>
                            <input type="email" name="email" id="id_email" class="form-control" autocomplete="email" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-envelope-arrow-up me-1"></i>Envoyer le lien
                        </button>
                    </form>
                    <div class="text-center mt-4">
                        <a href="{% url 'login' %}" class="text-decoration-none small">
                            <i class="bi bi-arrow-left me-1"></i>Retour à la connexion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
